<html lang="en">
<head>

<title>Daily Meal Plan</title>

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23639922'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='-apple-system,sans-serif' font-weight='500'%3EM%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg-page: #f7f6f3;
    --bg-primary: #ffffff;
    --bg-secondary: #f1efe8;
    --bg-info: #E6F1FB;
    --text-primary: #1a1a1a;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --text-info: #0C447C;
    --border-tertiary: rgba(0,0,0,0.1);
    --border-secondary: rgba(0,0,0,0.2);
    --border-info: #378ADD;
    --success: #639922;
    --success-light: #97C459;
    --danger: #E24B4A;
    --pill-p-bg: #EEEDFE; --pill-p-tx: #26215C;
    --pill-c-bg: #E1F5EE; --pill-c-tx: #04342C;
    --pill-f-bg: #FAEEDA; --pill-f-tx: #412402;
    --pill-fib-bg: #EAF3DE; --pill-fib-tx: #173404;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page: #1a1a18;
      --bg-primary: #26251f;
      --bg-secondary: #2f2e28;
      --bg-info: #0C447C;
      --text-primary: #f0ebe0;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --text-info: #B5D4F4;
      --border-tertiary: rgba(255,255,255,0.12);
      --border-secondary: rgba(255,255,255,0.22);
      --pill-p-bg: #3C3489; --pill-p-tx: #CECBF6;
      --pill-c-bg: #085041; --pill-c-tx: #9FE1CB;
      --pill-f-bg: #633806; --pill-f-tx: #FAC775;
      --pill-fib-bg: #27500A; --pill-fib-tx: #C0DD97;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    margin: 0;
    padding: 1rem 0.75rem calc(env(safe-area-inset-bottom) + 90px);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 760px; margin: 0 auto; }
  header { padding: 0.5rem 0.25rem 1rem; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin: 0; }

  /* Sticky tracker at top */
  .tracker {
    position: sticky;
    top: 8px;
    z-index: 10;
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 1rem;
  }
  .tracker-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .tracker-label {
    font-size: 11px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
  }
  .reset-btn {
    font-size: 12px; color: var(--text-secondary);
    background: none; border: none; cursor: pointer; padding: 4px 8px;
    font-family: inherit; border-radius: 6px;
  }
  .reset-btn:hover, .reset-btn:active { background: var(--bg-secondary); }
  .tracker-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  }
  .metric { min-width: 0; }
  .metric-label {
    font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.4px; margin: 0 0 3px;
    font-weight: 500;
  }
  .metric-val {
    font-size: 14px; font-weight: 500; margin: 0 0 5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .metric-val .target { color: var(--text-tertiary); font-weight: 400; font-size: 12px; }
  .bar {
    height: 4px; background: var(--bg-secondary);
    border-radius: 2px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; width: 0%;
    transition: width 0.25s ease, background 0.25s ease;
    border-radius: 2px;
  }
  .bar-fill.cal { background: var(--text-secondary); }
  .bar-fill.p { background: var(--pill-p-tx); }
  .bar-fill.c { background: var(--pill-c-tx); }
  .bar-fill.f { background: var(--pill-f-tx); }
  .bar-fill.fib { background: var(--pill-fib-tx); }
  .bar-fill.over { background: var(--danger) !important; }
  .over-note {
    font-size: 10px; color: var(--danger); margin-top: 2px;
    font-weight: 500;
  }
  @media (max-width: 420px) {
    .metric-val { font-size: 12px; }
    .metric-val .target { font-size: 10px; }
    .metric-label { font-size: 9px; }
  }

  /* Day panels */
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  /* Meal row */
  .meal-row {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s, background 0.2s;
  }
  .meal-row.checked {
    border-color: var(--success);
  }
  @media (prefers-color-scheme: dark) {
    .meal-row.checked { border-color: var(--success-light); }
  }
  .meal-header {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 6px;
  }
  .check-wrap {
    flex: 0 0 auto;
    padding-top: 2px;
    position: relative;
  }
  .check {
    width: 22px; height: 22px;
    border: 1.5px solid var(--border-secondary);
    border-radius: 5px;
    background: transparent;
    cursor: pointer;
    position: relative;
    display: block;
    transition: all 0.15s;
  }
  .check:hover { border-color: var(--success); }
  input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0; height: 0;
  }
  input[type="checkbox"]:checked + .check {
    background: var(--success);
    border-color: var(--success);
  }
  input[type="checkbox"]:checked + .check::after {
    content: "";
    position: absolute;
    left: 6px; top: 2px;
    width: 6px; height: 11px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  @media (prefers-color-scheme: dark) {
    input[type="checkbox"]:checked + .check {
      background: var(--success-light);
      border-color: var(--success-light);
    }
  }
  .meal-info { flex: 1; min-width: 0; }
  .meal-info-top {
    display: flex; justify-content: space-between;
    align-items: baseline; gap: 8px;
  }
  .meal-time {
    font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
    font-weight: 500;
  }
  .meal-title { font-size: 15px; font-weight: 500; margin: 2px 0 0; }
  .meal-cal {
    font-size: 13px; color: var(--text-secondary);
    font-weight: 500; white-space: nowrap; flex: 0 0 auto;
  }
  .meal-desc {
    font-size: 13px; color: var(--text-secondary);
    margin: 4px 0 10px; line-height: 1.55;
    transition: opacity 0.2s;
  }
  .meal-row.checked .meal-desc { opacity: 0.65; }
  .alt-line {
    font-size: 12px; color: var(--text-info);
    margin: 4px 0 10px; line-height: 1.5;
    padding: 8px 10px;
    background: var(--bg-info);
    border-radius: var(--radius-md);
  }
  .recipe-line {
    font-size: 12px; color: var(--text-primary);
    margin: 4px 0 10px; line-height: 1.5;
    padding: 8px 10px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    border-left: 2px solid var(--border-secondary);
  }
  .bottom-row {
    display: flex; justify-content: space-between;
    align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 6px;
  }
  .macro-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; padding: 3px 9px;
    border-radius: var(--radius-md);
    font-weight: 500;
  }
  .pill-p { background: var(--pill-p-bg); color: var(--pill-p-tx); }
  .pill-c { background: var(--pill-c-bg); color: var(--pill-c-tx); }
  .pill-f { background: var(--pill-f-bg); color: var(--pill-f-tx); }
  .pill-fib { background: var(--pill-fib-bg); color: var(--pill-fib-tx); }

  details.groc { font-size: 12px; }
  details.groc summary {
    cursor: pointer; color: var(--text-secondary);
    padding: 4px 10px;
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    font-weight: 500;
    list-style: none; user-select: none;
    display: inline-flex; align-items: center; gap: 4px;
  }
  details.groc summary::-webkit-details-marker { display: none; }
  details.groc summary::after {
    content: "\25BE"; font-size: 10px;
    transition: transform 0.15s;
  }
  details.groc[open] summary::after { transform: rotate(180deg); }
  .groc-content {
    margin-top: 8px; padding: 10px 12px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    font-size: 12px; color: var(--text-primary);
    line-height: 1.6;
    border-left: 2px solid var(--border-secondary);

  .day-totals {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 12px 14px; margin-top: 14px;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  }
  .tot-label {
    font-size: 10px; color: var(--text-tertiary);
    margin: 0; text-transform: uppercase; letter-spacing: 0.4px;
    font-weight: 500;
  }
  .tot-val { font-size: 14px; font-weight: 500; margin: 2px 0 0; }
  .note-box {
    font-size: 12px; color: var(--text-secondary);
    background: var(--bg-info);
    padding: 10px 12px;
    border-radius: var(--radius-md);
    margin-top: 10px; line-height: 1.55;
  }

  /* Bottom docked day tabs */
  .day-tabs {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex; justify-content: center; gap: 4px;
    padding: 10px 10px calc(env(safe-area-inset-bottom) + 10px);
    background: color-mix(in srgb, var(--bg-page) 92%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-top: 0.5px solid var(--border-tertiary);
  }
  .day-tabs-inner {
    display: flex; gap: 4px;
    max-width: 760px; width: 100%;
    justify-content: space-between;
  }
  .day-tab {
    flex: 1; min-width: 0;
    padding: 10px 4px; font-size: 13px; font-weight: 500;
    background: transparent;
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-md);
    cursor: pointer; color: var(--text-secondary);
    font-family: inherit;
    display: flex; flex-direction: column; align-items: center;
    gap: 2px;
    transition: all 0.15s;
  }
  .day-tab .progress-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border-tertiary);
    transition: background 0.2s;
  }
  .day-tab.has-checks .progress-dot { background: var(--success); }
  .day-tab.active {
    background: var(--bg-info); color: var(--text-info);
    border-color: var(--border-info);
  }
  .day-tab.active.has-checks .progress-dot { background: var(--text-info); }
</style>
</head>

    note:'Dance day. Post-dance protein + sufficient carbs = proper recovery.'
  },
  sun: {
    meals: [
      { id:'sun-1', time:'7–8am · Pre-dance', title:'Coffee + dates', cal:110, p:1, c:24, f:0, fib:2,
        desc:'Black coffee + 2 medjool dates.' },
      { id:'sun-2', time:'10:30am · Post-dance', title:'Protein + fruit', cal:160, p:25, c:12, f:2, fib:3,
        desc:'1 scoop plant protein + 100g seasonal fruit (watermelon, papaya, mango, or apple).' },
      { id:'sun-3', time:'1–2pm · Meal 1', title:'Chicken + aloo tikki bowl', cal:500, p:45, c:50, f:14, fib:9,
        desc:'Grilled chicken over mixed greens, rice, 2 baked aloo tikkis (~120g total), cucumber, cherry tomato, olive oil-lemon dressing, sunflower seeds.',
        zomato:'Grilled chicken salad bowl from EatFit, Salad Days, FreshMenu.' },
      { id:'sun-4', time:'5pm · Snack', title:'Cucumber sticks + curd dip', cal:130, p:8, c:12, f:5, fib:4,
        desc:'Cucumber + carrot sticks with hung curd dip (garlic, mint, black pepper, lemon). Light snack before dinner.' },
      { id:'sun-5', time:'8–8:30pm · Meal 2', title:'Egg curry + rice + palak', cal:550, p:28, c:60, f:16, fib:9,
        desc:'3 hard-boiled eggs in tomato-onion-ginger curry, rice, sautéed spinach with garlic, cucumber raita.' }
    ],
    totals:{cal:1450,p:107,c:158,f:37,fib:27},
    note:'Dance day. 10-min walk after dinner for digestion.'
  }
};

let currentDay = 'mon';

function getCheckedIds(day) {
  try {
    const raw = localStorage.getItem('mealPlan_checked_' + day);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function setCheckedIds(day, ids) {
  try { localStorage.setItem('mealPlan_checked_' + day, JSON.stringify(ids)); } catch {}
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = DAY_ORDER.map(day => {
    const hasChecks = getCheckedIds(day).length > 0;
    return `<button class="day-tab${day === currentDay ? ' active' : ''}${hasChecks ? ' has-checks' : ''}" data-day="${day}">
      <span>${DAY_SHORT[day]}</span>
      <span class="progress-dot"></span>
    </button>`;
  }).join('');
  tabs.querySelectorAll('.day-tab').forEach(btn => {
    btn.addEventListener('click', () => switchDay(btn.dataset.day));
  });
}

function renderPanel(day) {
  const plan = MEAL_PLAN[day];
  const checkedIds = getCheckedIds(day);
  const mealsHtml = plan.meals.map(m => {
    const checked = checkedIds.includes(m.id);
    return `<div class="meal-row${checked ? ' checked' : ''}" data-meal-id="${m.id}">
      <div class="meal-header">
        <label class="check-wrap">
          <input type="checkbox" ${checked ? 'checked' : ''} data-meal-id="${m.id}">
          <span class="check"></span>
        </label>
        <div class="meal-info">
          <div class="meal-info-top">
            <div>
              <div class="meal-time">${escapeHtml(m.time)}</div>
              <div class="meal-title">${escapeHtml(m.title)}</div>
            </div>
            <div class="meal-cal">${m.cal} cal</div>
          </div>
        </div>
      </div>
      <p class="meal-desc">${escapeHtml(m.desc)}</p>
      ${m.recipe ? `<div class="recipe-line"><strong>Recipe:</strong> ${escapeHtml(m.recipe.replace(/^Hung curd recipe: /, ''))}</div>` : ''}
      ${m.zomato ? `<div class="alt-line"><strong>Zomato alt:</strong> ${escapeHtml(m.zomato)}</div>` : ''}
      <div class="bottom-row">
        <div class="macro-pills">
          <span class="pill pill-p">${m.p}g P</span>
          <span class="pill pill-c">${m.c}g C</span>
          <span class="pill pill-f">${m.f}g F</span>
          <span class="pill pill-fib">${m.fib}g fiber</span>
        </div>
        ${m.groceries ? `<details class="groc"><summary>Groceries</summary><div class="groc-content">${escapeHtml(m.groceries)}</div></details>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="day-panel active" id="panel-${day}">
    ${mealsHtml}
    <div class="day-totals">
      <div><p class="tot-label">Calories</p><p class="tot-val">${plan.totals.cal.toLocaleString()}</p></div>
      <div><p class="tot-label">Protein</p><p class="tot-val">${plan.totals.p}g</p></div>
      <div><p class="tot-label">Carbs</p><p class="tot-val">${plan.totals.c}g</p></div>
      <div><p class="tot-label">Fat</p><p class="tot-val">${plan.totals.f}g</p></div>
      <div><p class="tot-label">Fiber</p><p class="tot-val">${plan.totals.fib}g</p></div>
    </div>
    <div class="note-box">${escapeHtml(plan.note)}</div>
  </div>`;
}

function renderPanels() {
  document.getElementById('panels').innerHTML = renderPanel(currentDay);
  attachCheckboxHandlers();
}

function attachCheckboxHandlers() {
  document.querySelectorAll('input[type="checkbox"][data-meal-id]').forEach(cb => {
    cb.addEventListener('change', (e) => {
      const mealId = e.target.dataset.mealId;
      let ids = getCheckedIds(currentDay);
      if (e.target.checked) {
        if (!ids.includes(mealId)) ids.push(mealId);
      } else {
        ids = ids.filter(i => i !== mealId);
      }
      setCheckedIds(currentDay, ids);
      const row = e.target.closest('.meal-row');
      if (row) row.classList.toggle('checked', e.target.checked);
      renderTracker();
      renderTabs();
    });
  });
}

function computeConsumed(day) {
  const ids = getCheckedIds(day);
  const plan = MEAL_PLAN[day];
  const totals = { cal:0, p:0, c:0, f:0, fib:0 };
  plan.meals.forEach(m => {
    if (ids.includes(m.id)) {
      totals.cal += m.cal;
      totals.p += m.p;
      totals.c += m.c;
      totals.f += m.f;
      totals.fib += m.fib;
    }
  });
  return totals;
}

function renderTracker() {
  const consumed = computeConsumed(currentDay);
  document.getElementById('trackerDayLabel').textContent = DAY_NAMES[currentDay] + "'s progress";

  const metrics = [
    { key:'cal', label:'Calories', cls:'cal', value:consumed.cal, target:TARGETS.cal, unit:'', fmt: v => v.toLocaleString() },
    { key:'p',   label:'Protein',  cls:'p',   value:consumed.p,   target:TARGETS.p,   unit:'g' },
    { key:'c',   label:'Carbs',    cls:'c',   value:consumed.c,   target:TARGETS.c,   unit:'g' },
    { key:'f',   label:'Fat',      cls:'f',   value:consumed.f,   target:TARGETS.f,   unit:'g' },
    { key:'fib', label:'Fiber',    cls:'fib', value:consumed.fib, target:TARGETS.fib, unit:'g' }
  ];

  const grid = document.getElementById('trackerGrid');
  grid.innerHTML = metrics.map(m => {
    const pct = Math.min(100, Math.round((m.value / m.target) * 100));
    const over = m.value > m.target;
    const overBy = over ? m.value - m.target : 0;
    const fmt = m.fmt || (v => v);
    return `<div class="metric">
      <p class="metric-label">${m.label}</p>
      <div class="metric-val">${fmt(m.value)}${m.unit}<span class="target"> / ${fmt(m.target)}${m.unit}</span></div>
      <div class="bar"><div class="bar-fill ${m.cls}${over ? ' over' : ''}" style="width: ${over ? 100 : pct}%"></div></div>
      ${over ? `<div class="over-note">+${fmt(overBy)}${m.unit} over</div>` : ''}
    </div>`;
  }).join('');
}

function switchDay(day) {
  currentDay = day;
  renderTabs();
  renderPanels();
  renderTracker();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Reset all check-offs for ' + DAY_NAMES[currentDay] + '?')) return;
  setCheckedIds(currentDay, []);
  renderPanels();
  renderTracker();
  renderTabs();
});

// Auto-select today's day on first load
(function initDay() {
  const todayIdx = new Date().getDay(); // 0 = Sun
  const map = [6, 0, 1, 2, 3, 4, 5]; // JS Sun=0 → our idx; Sun=6 in our order
  currentDay = DAY_ORDER[map[todayIdx]];
})();

renderTabs();
renderPanels();
renderTracker();
</script>
</body>
</html>
